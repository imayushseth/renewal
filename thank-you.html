<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - Payment Submitted</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f9f9f9;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      .thank-you-container {
        background: #fff;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 90%;
      }
      h1 {
        color: green;
        font-size: 24px;
        margin-bottom: 15px;
      }
      p {
        font-size: 16px;
        color: #444;
        margin-bottom: 25px;
      }
      .btn {
        display: inline-block;
        padding: 12px 20px;
        margin: 8px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        color: #fff;
      }
      .btn-whatsapp {
        background-color: #25d366;
      }
      .btn-home {
        background-color: #0275d8;
      }
    </style>
  </head>
  <body>
    <div class="thank-you-container">
      <h1>✅ Thank You!</h1>
      <p>
        Your payment details have been submitted successfully.<br />
        Your website will be renewed in <strong>3–4 days</strong> after
        confirmation.
      </p>
      <a
        href="https://wa.me/918981327228?text=Hello%20Team,%20I%20have%20successfully%20submitted%20the%20renewal%20payment.%20Please%20confirm."
        class="btn btn-whatsapp"
        target="_blank"
      >
        Contact on WhatsApp
      </a>
      <a href="/" class="btn btn-home">Back to Home</a>
    </div>
  </body>
</html>
